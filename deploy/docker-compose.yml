services:
  gateway:
    image: ghcr.io/mrpintcom/membrain:0.10.0
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    # Only start under the tls-proxy profile (wrapper sets COMPOSE_PROFILES via
    # profiles_add) — otherwise caddy starts on every base 'up -d' and crash-loops
    # with no Caddyfile/cert present. Listen on :443 to match the host
    # api.anthropic.com -> 127.0.0.1 redirect (was :8443, which nothing reached). (review 2026-06-17)
    profiles: ["tls-proxy"]
    ports:
      - "443:443"
    volumes:
      - ./certs:/certs:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - gateway
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: membrain
      POSTGRES_USER: membrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U membrain"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    restart: unless-stopped

  embedder:
    build: ./embedder
    profiles: ["ml-search"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
